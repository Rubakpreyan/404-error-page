<!DOCTYPE html>
<html lang="en" class="relative min-h-full">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./img/devchallenges.png" />
    <link rel="shortcut icon" href="./img/devchallenges.png" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/font.css" />
    <title>404 page</title>
  </head>

  <body style="color: #333" class="bg-white">
    <div class="p-4 pb-16 sm:p-8 sm:pt-4">
      <header>
        <span class="header-font">404 not found</span>
      </header>
      <div
        class="p-2 pt-12 space-y-4 lg:p-10 lg:grid lg:grid-cols-2 lg:space-y-0 lg:gap-x-5"
      >
        <div class="flex items-center justify-center">
          <img
            class="object-center lg:w-8/12"
            src="./img/Scarecrow.png"
            alt="scare_crow"
          />
        </div>
        <div class="space-y-10 lg:p-10 w-60 lg:w-96">
          <strong class="text-4xl leading-snug title-font"
            >I have bad news for you</strong
          >
          <p class="content-font md:text-md xl:text-lg">
            The page you are looking for might be removed or is temporarily
            unavailable
          </p>
          <button style="background: #333" class="p-5">
            <span class="text-xs font-semibold text-white title-font"
              >Back to homepage</span
            >
          </button>
        </div>
      </div>
    </div>
    <div class="absolute inset-x-0 w-full bottom-2">
      <footer class="text-center">
        <a
          href="https://github.com/Rubakpreyan"
          target="_blank"
          rel="noopener noreferrer"
          class="text-sm text-gray-500 footer-font"
        >
          Anonymous@DevChallenges.io</a
        >
      </footer>
    </div>
  </body>
</html>
